<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Health Tech Connect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="min-height:100vh; background: linear-gradient(120deg, #e3f2fd 0%, #fff 100%);">

  <header class="header">
    <div class="logo"><span class="icon">🩸</span> Health Tech Connect</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="find-blood.html">Find Blood</a>
      <a href="request.html">Request</a>
      <a href="login.html" class="active">Login</a>
      <a href="regis.html">Signup</a>
    </nav>
  </header>

  <main style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
    <div class="login-card glass-card">
      <h2 style="text-align:center;color:#1976d2;font-weight:700;margin-bottom:1.5rem;">
        Welcome Back 👋
      </h2>
      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@email.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" style="width:100%;margin-top:1.3rem;">Login</button>
      </form>
      <div style="text-align:center;margin-top:1.4rem;font-size:0.95rem;">
        <span>New here? </span>
        <a href="regis.html" style="color:#e53935;font-weight:600;">Create account</a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
